name: EAS Build — Android

on:
  push:
    branches: [main]
    tags:
      - 'v*'            # trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel a running build

jobs:
  build-android:
    name: Build Android (${{ inputs.profile || (startsWith(github.ref, 'refs/tags/') && 'production' || 'preview') }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BUILD_PROFILE: ${{ inputs.profile || (startsWith(github.ref, 'refs/tags/') && 'production' || 'preview') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run tests (pre-build gate)
        run: npm test
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://test.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: test-rc-key

      - name: Create .env from secrets
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}" >> .env

      - name: EAS Build
        run: eas build --platform android --profile ${{ env.BUILD_PROFILE }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # Submit to Google Play only on production builds triggered by a version tag
  submit-android:
    name: Submit to Google Play (internal track)
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.profile == 'production'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create Google Play key file
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > google-play-key.json

      - name: EAS Submit
        run: eas submit --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Clean up key file
        if: always()
        run: rm -f google-play-key.json
